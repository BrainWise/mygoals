<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>MyGoals — Siehdi Institute</title>
<meta name="theme-color" content="#0b1623">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyGoals">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--bg:#0b1623;--bg2:#12202f;--bg3:#192d42;--gold:#c9a84c;--goldlt:rgba(201,168,76,0.15);--cream:#ede8df;--muted:#9a9590;--green:#27a85a;--greenlt:rgba(39,168,90,0.15);--red:#c0392b;--amber:#c47f00;--blue:#3a8fd4;--b1:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.15);--r:10px;--r2:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--cream);max-width:560px;margin:0 auto;padding-bottom:90px;font-size:15px;line-height:1.5;}
#hdr{background:var(--bg);border-bottom:1px solid var(--b1);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.app-name{font-size:16px;font-weight:600;color:var(--gold);}
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:var(--bg2);border-top:1px solid var(--b1);display:flex;z-index:50;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 14px;gap:2px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-family:inherit;}
.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nb.on{color:var(--gold);}
#content{padding:14px 14px 4px;}
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;margin-bottom:10px;}
.card-gold{border-color:rgba(201,168,76,0.35);}
.sl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;display:block;margin-bottom:10px;}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);padding:10px 12px;color:var(--cream);font-size:14px;font-family:inherit;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
textarea{resize:none;}
select option{background:var(--bg2);}
.btn{background:none;border:1px solid var(--b2);color:var(--cream);border-radius:var(--r);padding:8px 14px;font-family:inherit;font-size:14px;cursor:pointer;}
.btn-primary{background:var(--gold);border-color:var(--gold);color:#0b1623;font-weight:600;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.btn-danger{color:var(--red);border-color:rgba(192,57,43,0.35);}
.btn-success{background:var(--greenlt);border-color:rgba(39,168,90,0.4);color:var(--green);}
.btn-full{width:100%;}
.pb{background:var(--bg3);border-radius:3px;height:5px;overflow:hidden;margin:6px 0;}
.pf{height:5px;background:var(--gold);border-radius:3px;transition:width 0.4s;}
.pf-green{background:var(--green);}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap;}
.p-1m,.p-3m{background:rgba(39,168,90,0.18);color:#5dca85;}
.p-6m{background:rgba(58,143,212,0.18);color:#7abde8;}
.p-1y{background:rgba(201,168,76,0.18);color:var(--gold);}
.p-3y{background:rgba(125,60,152,0.18);color:#b07fd8;}
.p-5y,.p-10y{background:rgba(192,57,43,0.18);color:#e07878;}
.cat-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--goldlt);color:var(--gold);font-weight:500;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.fpill{padding:5px 11px;border-radius:16px;border:1px solid var(--b2);background:none;color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit;}
.fpill.on{border-color:var(--gold);background:var(--goldlt);color:var(--cream);}
.gpill{width:100%;text-align:left;padding:9px 12px;border-radius:8px;border:1px solid var(--b2);background:none;color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.gpill.on{border-color:var(--gold);background:var(--goldlt);color:var(--cream);}
.day-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--b2);background:none;color:var(--muted);font-size:10px;cursor:pointer;font-family:inherit;font-weight:600;}
.day-btn.done{background:var(--gold);border-color:var(--gold);color:#0b1623;}
.day-btn.today{border-color:var(--gold);color:var(--gold);}
.sc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:12px 8px;text-align:center;}
.sv{font-size:24px;font-weight:600;line-height:1;margin-bottom:4px;}
.sk{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
#toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--b2);border-radius:20px;padding:8px 18px;font-size:13px;color:var(--cream);opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;z-index:200;}
#toast.show{opacity:1;}
.empty{text-align:center;padding:32px 16px;color:var(--muted);}
.empty-icon{font-size:34px;margin-bottom:10px;}
#auth-screen{position:fixed;inset:0;background:linear-gradient(160deg,#070f1a 0%,#0b1623 60%,#0f1f35 100%);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.auth-card{background:rgba(18,32,47,0.96);border:1px solid var(--b2);border-radius:16px;padding:22px;width:100%;max-width:360px;}
.auth-title{font-size:18px;font-weight:600;color:var(--cream);text-align:center;margin-bottom:16px;}
.auth-field{margin-bottom:10px;}
.auth-field label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:4px;}
.auth-err{font-size:11px;text-align:center;margin-top:6px;min-height:16px;}
.auth-link{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;cursor:pointer;}
.auth-link span{color:var(--gold);}
.save-confirm{display:none;font-size:12px;color:var(--green);background:var(--greenlt);border-radius:6px;padding:5px 10px;margin-top:5px;}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 12px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);margin-bottom:3px;}
.acc-hdr.open{border-radius:var(--r2) var(--r2) 0 0;}
.acc-body{background:var(--bg2);border:1px solid var(--b1);border-top:none;border-radius:0 0 var(--r2) var(--r2);padding:12px;margin-bottom:10px;}
.act-row{background:var(--bg3);border-radius:8px;padding:10px;margin-bottom:8px;}
.act-row.saved{border:1px solid rgba(39,168,90,0.35);}
.bar-wrap{margin-bottom:10px;}
.bar-lbl{font-size:12px;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between;}
.bar-track{background:var(--bg3);border-radius:3px;height:8px;overflow:hidden;}
.bar-fill{height:8px;border-radius:3px;transition:width 0.4s;}
hr.div{border:none;border-top:1px solid var(--b1);margin:12px 0;}
</style>
</head>
<body>
<div id="auth-screen">
  <div style="text-align:center;margin-bottom:22px">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 90" width="160" height="65" style="display:block;margin:0 auto 10px">
      <circle cx="16" cy="16" r="13" fill="#e74c3c"/><circle cx="46" cy="16" r="13" fill="#f39c12"/><circle cx="76" cy="16" r="13" fill="#27ae60"/>
      <text x="3" y="54" font-family="Arial,sans-serif" font-size="27" font-weight="bold" fill="#8bbfe8" letter-spacing="3">SIEHDI</text>
      <text x="3" y="73" font-family="Arial,sans-serif" font-size="13" fill="#8bbfe8" letter-spacing="5">INSTITUTE</text>
    </svg>
    <p style="font-size:22px;font-weight:700;color:#c9a84c;margin:0">MyGoals</p>
    <p style="font-size:11px;color:#9a9590;margin-top:4px;letter-spacing:2px;text-transform:uppercase">Personal Goal Tracker</p>
  </div>
  <div class="auth-card" id="auth-content">Loading...</div>
  <p style="font-size:10px;color:rgba(154,149,144,0.4);margin-top:14px;text-align:center">&copy; Siehdi Institute &middot; BrainWise Enterprise</p>
</div>
<div id="app" style="display:none">
  <header id="hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 38" width="65" height="22">
        <circle cx="8" cy="7" r="6" fill="#e74c3c"/><circle cx="22" cy="7" r="6" fill="#f39c12"/><circle cx="36" cy="7" r="6" fill="#27ae60"/>
        <text x="2" y="23" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#8bbfe8" letter-spacing="2">SIEHDI</text>
        <text x="2" y="33" font-family="Arial,sans-serif" font-size="7" fill="#8bbfe8" letter-spacing="3">INSTITUTE</text>
      </svg>
      <span class="app-name">MyGoals</span>
    </div>
    <button id="btn-logout" class="btn btn-sm" style="color:#9a9590;border-color:var(--b1);font-size:11px">Log Out</button>
  </header>
  <main id="content"></main>
  <nav id="bnav">
    <button class="nb on" id="nav-goals" onclick="switchTab('goals')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Goals
    </button>
    <button class="nb" id="nav-week" onclick="switchTab('week')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>This Week
    </button>
    <button class="nb" id="nav-progress" onclick="switchTab('progress')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Progress
    </button>
    <button class="nb" id="nav-analysis" onclick="switchTab('analysis')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Analysis
    </button>
  </nav>
</div>
<div id="toast"></div>
<script>
var SU='https://syxmglodnuhicvlzmscc.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eG1nbG9kbnVoaWN2bHptc2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mzk5MTAsImV4cCI6MjA5MzQxNTkxMH0.eJDDTL-afFr3E_t9owfqnDf4YuL0jftlRjBlYzgabSg';
var PERIODS=[{key:'1m',label:'1 Month',weeks:4},{key:'3m',label:'3 Months',weeks:13},{key:'6m',label:'6 Months',weeks:26},{key:'1y',label:'1 Year',weeks:52},{key:'3y',label:'3 Years',weeks:156},{key:'5y',label:'5 Years',weeks:260},{key:'10y',label:'10 Years',weeks:520}];
var CATS=[{key:'spiritual',label:'Spiritual'},{key:'health',label:'Health'},{key:'family',label:'Family'},{key:'finance',label:'Finance'},{key:'charity',label:'Charity'},{key:'professional',label:'Professional / Work'},{key:'personal',label:'Personal Development'},{key:'rest',label:'Rest & Recovery'},{key:'other',label:'Other'}];
var DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var sb=null,CU=null;
var ST={tab:'goals',wk:getMonday(new Date()),showAdd:false,editId:null,aView:'login',gCat:'all',wkCat:'all',prCat:'all',prSt:'active',anCat:'all',anPer:'all'};
var DB={goals:[],weeks:{}};
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function td(){return new Date().toISOString().slice(0,10);}
function pd(n){return String(n).padStart(2,'0');}
function getMonday(d){var dt=new Date(d);var dy=dt.getDay();dt.setDate(dt.getDate()-dy+(dy===0?-6:1));return dt.toISOString().slice(0,10);}
function pMon(m){var d=new Date(m+'T12:00:00');d.setDate(d.getDate()-7);return d.toISOString().slice(0,10);}
function nMon(m){var d=new Date(m+'T12:00:00');d.setDate(d.getDate()+7);return d.toISOString().slice(0,10);}
function isCW(m){return m===getMonday(new Date());}
function isFW(m){return m>getMonday(new Date());}
function tdIdx(){var d=new Date().getDay();return d===0?6:d-1;}
function wkLabel(mn){
  var d=new Date(mn+'T12:00:00'),su=new Date(d);su.setDate(d.getDate()+6);
  var sm=MONTHS[d.getMonth()].slice(0,3),em=MONTHS[su.getMonth()].slice(0,3);
  return sm===em?sm+' '+d.getDate()+'&ndash;'+su.getDate()+' '+d.getFullYear():sm+' '+d.getDate()+' &ndash; '+em+' '+su.getDate()+' '+d.getFullYear();
}
function cLabel(key,cust){if(key==='other'&&cust)return cust;var c=CATS.find(function(x){return x.key===key;});return c?c.label:key||'';}
function mOpts(sel){
  var now=new Date(),h='';
  for(var y=now.getFullYear();y<=now.getFullYear()+3;y++){
    for(var m=0;m<12;m++){
      if(y===now.getFullYear()&&m<now.getMonth())continue;
      var v=y+'-'+pd(m+1);h+='<option value="'+v+'"'+(v===sel?' selected':'')+'>'+MONTHS[m]+' '+y+'</option>';
    }
  }
  return h;
}
var tT=null;
function toast(msg,type){
  var el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.style.borderColor=type==='error'?'rgba(192,57,43,.6)':type==='success'?'rgba(39,168,90,.6)':'rgba(255,255,255,.15)';
  el.classList.add('show');clearTimeout(tT);tT=setTimeout(function(){el.classList.remove('show');},2800);
}
function initSB(){try{sb=supabase.createClient(SU,SK);return true;}catch(e){return false;}}
function renderAuth(){
  var c=document.getElementById('auth-content');if(!c)return;
  if(ST.aView==='signup'){
    c.innerHTML='<p class="auth-title">Create Account</p>'
      +'<div class="auth-field"><label>Full Name</label><input type="text" id="su-n" placeholder="Your full name"></div>'
      +'<div class="auth-field"><label>Email</label><input type="email" id="su-e" placeholder="your@email.com"></div>'
      +'<div class="auth-field"><label>Password</label><input type="password" id="su-p" placeholder="Min 6 characters" onkeydown="if(event.key===\'Enter\')doSignup()"></div>'
      +'<div id="a-err" class="auth-err"></div>'
      +'<button class="btn btn-primary btn-full" style="margin-top:10px" onclick="doSignup()">Create Account</button>'
      +'<p class="auth-link" onclick="ST.aView=\'login\';renderAuth()">Have an account? <span>Sign In</span></p>';
  }else{
    c.innerHTML='<p class="auth-title">Welcome Back</p>'
      +'<div class="auth-field"><label>Email</label><input type="email" id="lg-e" placeholder="your@email.com"></div>'
      +'<div class="auth-field"><label>Password</label><input type="password" id="lg-p" placeholder="Password" onkeydown="if(event.key===\'Enter\')doLogin()"></div>'
      +'<div id="a-err" class="auth-err"></div>'
      +'<button class="btn btn-primary btn-full" style="margin-top:10px" onclick="doLogin()">Sign In</button>'
      +'<p class="auth-link" onclick="ST.aView=\'signup\';renderAuth()">New user? <span>Create Account</span></p>';
  }
}
async function doLogin(){
  var e=document.getElementById('lg-e'),p=document.getElementById('lg-p'),err=document.getElementById('a-err');
  if(!e.value.trim()||!p.value){err.textContent='Enter email and password.';err.style.color='var(--red)';return;}
  err.textContent='Signing in...';err.style.color='var(--muted)';
  var r=await sb.auth.signInWithPassword({email:e.value.trim(),password:p.value});
  if(r.error){err.textContent=r.error.message;err.style.color='var(--red)';}
}
async function doSignup(){
  var n=document.getElementById('su-n'),e=document.getElementById('su-e'),p=document.getElementById('su-p'),err=document.getElementById('a-err');
  if(!n.value.trim()){err.textContent='Enter your full name.';err.style.color='var(--red)';return;}
  if(!e.value.trim()){err.textContent='Enter your email.';err.style.color='var(--red)';return;}
  if(p.value.length<6){err.textContent='Password must be at least 6 characters.';err.style.color='var(--red)';return;}
  err.textContent='Creating account...';err.style.color='var(--muted)';
  var r=await sb.auth.signUp({email:e.value.trim(),password:p.value,options:{data:{full_name:n.value.trim()}}});
  if(r.error){err.textContent=r.error.message;err.style.color='var(--red)';}
  else{err.innerHTML='<strong style="color:var(--gold)">\u2713 Account created!</strong> Check your email for a verification link, then sign in.';err.style.color='var(--gold)';}
}
async function doLogout(){
  CU=null;DB={goals:[],weeks:{}};
  try{if(sb)await sb.auth.signOut();}catch(e){}
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  ST.aView='login';renderAuth();
}
async function loadData(){
  if(!CU||!sb)return;
  try{var r=await sb.from('mygoals_data').select('data').eq('user_id',CU.id).maybeSingle();
    if(r&&r.data&&r.data.data){var d=r.data.data;DB.goals=d.goals||[];DB.weeks=d.weeks||{};}
  }catch(e){console.warn(e);}
}
async function saveData(){
  if(!CU||!sb)return;
  try{await sb.from('mygoals_data').upsert({user_id:CU.id,data:JSON.parse(JSON.stringify(DB)),updated_at:new Date().toISOString()},{onConflict:'user_id'});}
  catch(e){console.warn(e);}
}
function switchTab(t){
  ST.tab=t;ST.showAdd=false;ST.editId=null;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  var n=document.getElementById('nav-'+t);if(n)n.classList.add('on');
  render();window.scrollTo(0,0);
}
function getGoal(id){return DB.goals.find(function(g){return g.id===id;});}
function actGoals(){return DB.goals.filter(function(g){return!g.archived&&!g.completed;});}
function gProg(id){
  var g=getGoal(id);if(!g)return{weeks:0,total:52,pct:0,aD:0,aT:0,aPct:0};
  var pO=PERIODS.find(function(p){return p.key===g.period;})||{weeks:52};
  var wS=0,dn=0,ps=0;
  Object.keys(DB.weeks).forEach(function(wk){
    var w=DB.weeks[wk];
    if(w.selected&&w.selected.indexOf(id)>-1){
      wS++;
      var acts=w.activities&&w.activities[id]||[];
      acts.forEach(function(a){(a.days||[]).forEach(function(d){if(d)dn++;ps++;});});
    }
  });
  return{weeks:wS,total:pO.weeks,pct:Math.min(100,Math.round(wS/pO.weeks*100)),aD:dn,aT:ps,aPct:ps>0?Math.round(dn/ps*100):0};
}
function showCust(sId,cId){
  var s=document.getElementById(sId),c=document.getElementById(cId);
  if(s&&c)c.style.display=s.value==='other'?'block':'none';
}
function cOpts(sId,cId,cur){
  return'<select id="'+sId+'" onchange="showCust(\''+sId+'\',\''+cId+'\')">'
    +'<option value="">Category \u25be</option>'
    +CATS.map(function(c){return'<option value="'+c.key+'"'+(c.key===cur?' selected':'')+'>'+c.label+'</option>';}).join('')
    +'</select>'
    +'<input type="text" id="'+cId+'" placeholder="Your category name..." style="margin-top:6px;display:'+(cur==='other'?'block':'none')+'">';
}
function submitGoal(){
  var t=document.getElementById('g-t'),p=document.getElementById('g-p'),m=document.getElementById('g-m'),cat=document.getElementById('g-cat'),cu=document.getElementById('g-cu');
  if(!t||!t.value.trim()){toast('Write your goal first','error');return;}
  if(!p||!p.value){toast('Select a time period','error');return;}
  if(!cat||!cat.value){toast('Select a category','error');return;}
  var now=new Date();
  var g={id:uid(),title:t.value.trim(),period:p.value,category:cat.value,customCat:cat.value==='other'&&cu?cu.value.trim():'',startMonth:m?m.value:now.getFullYear()+'-'+pd(now.getMonth()+1),created:td(),archived:false,completed:false,completedDate:null};
  DB.goals.unshift(g);saveData();ST.showAdd=false;render();toast('Goal saved \u2713','success');
}
function startEdit(id){ST.editId=id;ST.showAdd=false;render();window.scrollTo(0,0);}
function cancelEdit(){ST.editId=null;render();}
function saveEdit(id){
  var g=getGoal(id);if(!g)return;
  var t=document.getElementById('et'),p=document.getElementById('ep'),m=document.getElementById('em'),cat=document.getElementById('ecat'),cu=document.getElementById('ecu');

    +'<option value="all">All Periods</option>'
    +PERIODS.map(function(p){return'<option value="'+p.key+'"'+(p.key===ST.anPer?' selected':'')+'>'+p.label+'</option>';}).join('')+'</select></div>';
  var now=new Date(),wkDates=[];
  for(var i=7;i>=0;i--){var dd=new Date(now);dd.setDate(now.getDate()-(i*7));wkDates.push(getMonday(dd));}
  var wkChart='<div class="card"><span class="sl" style="margin-bottom:10px">Weekly Activity Rate (last 8 weeks)</span>'
    +wkDates.map(function(wk){
      var w=DB.weeks[wk];var dn=0,ps=0;
      if(w&&w.activities)Object.keys(w.activities).forEach(function(id){
        var g=getGoal(id);if(!g)return;
        if(ST.anCat!=='all'&&g.category!==ST.anCat)return;
        if(ST.anPer!=='all'&&g.period!==ST.anPer)return;
        (w.activities[id]||[]).forEach(function(a){(a.days||[]).forEach(function(dy){if(dy)dn++;ps++;});});
      });
      var pct=ps>0?Math.round(dn/ps*100):0;
      var d2=new Date(wk+'T12:00:00');
      var lbl=MONTHS[d2.getMonth()].slice(0,3)+' '+d2.getDate();
      var col=pct>=70?'var(--green)':pct>=40?'var(--gold)':'rgba(192,57,43,.7)';
      return'<div class="bar-wrap"><div class="bar-lbl"><span>'+lbl+'</span><span>'+pct+'% ('+dn+'/'+ps+' days)</span></div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>';
    }).join('')+'</div>';
  var catRows=CATS.map(function(c){
    var cg=DB.goals.filter(function(g){return g.category===c.key&&(ST.anPer==='all'||g.period===ST.anPer);});
    if(!cg.length)return'';
    var tot=cg.length,comp=cg.filter(function(g){return g.completed;}).length;
    var dn=0,ps=0;cg.forEach(function(g){var pr=gProg(g.id);dn+=pr.aD;ps+=pr.aT;});
    var pct=ps>0?Math.round(dn/ps*100):0;
    return'<div class="bar-wrap"><div class="bar-lbl"><span>'+esc(c.label)+'</span><span style="color:var(--muted)">'+comp+'/'+tot+' done &bull; '+pct+'% activity</span></div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:var(--gold)"></div></div></div>';
  }).join('');
  var catChart=catRows?'<div class="card"><span class="sl" style="margin-bottom:10px">Performance by Category</span>'+catRows+'</div>':'';
  var all=DB.goals.filter(function(g){return(ST.anCat==='all'||g.category===ST.anCat)&&(ST.anPer==='all'||g.period===ST.anPer);});
  var ov=all.length?'<div class="card"><span class="sl" style="margin-bottom:10px">Goals Overview</span>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'
    +'<div class="sc"><div class="sv" style="color:var(--gold)">'+all.filter(function(g){return!g.archived&&!g.completed;}).length+'</div><div class="sk">Active</div></div>'
    +'<div class="sc"><div class="sv" style="color:var(--green)">'+all.filter(function(g){return g.completed;}).length+'</div><div class="sk">Completed</div></div>'
    +'<div class="sc"><div class="sv" style="color:var(--muted)">'+all.filter(function(g){return g.archived;}).length+'</div><div class="sk">Archived</div></div>'
    +'</div></div>':'';
  return'<span class="sl">Analysis &amp; Trends</span>'+f+ov+wkChart+catChart+'<div style="height:20px"></div>';
}
function render(){var c=document.getElementById('content');if(!c)return;var fns={goals:rGoals,week:rWeek,progress:rProgress,analysis:rAnalysis};c.innerHTML=(fns[ST.tab]||rGoals)();}
async function init(){
  if(!initSB())return;
  renderAuth();
  sb.auth.onAuthStateChange(async function(ev,session){
    if(ev==='SIGNED_IN'&&session){
      CU=session.user;await loadData();
      document.getElementById('auth-screen').style.display='none';
      document.getElementById('app').style.display='block';
      render();
      if(CU&&!CU.email_confirmed_at)setTimeout(function(){toast('Please verify your email \u2014 check your inbox for a confirmation link.','error');},1200);
    }
    if(ev==='SIGNED_OUT'){CU=null;DB={goals:[],weeks:{}};document.getElementById('auth-screen').style.display='flex';document.getElementById('app').style.display='none';renderAuth();}
  });
  var res=await sb.auth.getSession();
  if(res.data&&res.data.session){CU=res.data.session.user;await loadData();document.getElementById('auth-screen').style.display='none';document.getElementById('app').style.display='block';render();}
  document.getElementById('btn-logout').onclick=doLogout;
}
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});}
init();
</script>
